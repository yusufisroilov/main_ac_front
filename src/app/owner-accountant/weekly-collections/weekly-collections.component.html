<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-success card-header-icon">
            <div class="card-icon"><i class="material-icons">bar_chart</i></div>
            <h4 class="card-title">Yig'imlar (Hisob bo'yicha)</h4>
          </div>
          <div class="card-body">
            <!-- Period selector -->
            <div class="period-row">
              <div class="period-buttons">
                <button class="btn btn-sm" [class.btn-success]="activePeriod === 'this_month'"
                  [class.btn-outline-secondary]="activePeriod !== 'this_month'" (click)="setPeriod('this_month')">
                  <i class="material-icons">calendar_today</i> Shu Oy
                </button>
                <button class="btn btn-sm" [class.btn-info]="activePeriod === 'last_month'"
                  [class.btn-outline-secondary]="activePeriod !== 'last_month'" (click)="setPeriod('last_month')">
                  <i class="material-icons">event</i> O'tgan Oy
                </button>
                <button class="btn btn-sm" [class.btn-warning]="activePeriod === 'custom'"
                  [class.btn-outline-secondary]="activePeriod !== 'custom'" (click)="setPeriod('custom')">
                  <i class="material-icons">date_range</i> Sana tanlash
                </button>
              </div>

              <div class="custom-range" *ngIf="activePeriod === 'custom'">
                <input type="date" class="form-control form-control-sm" [(ngModel)]="customFrom" />
                <span class="range-sep">—</span>
                <input type="date" class="form-control form-control-sm" [(ngModel)]="customTo" />
                <button class="btn btn-sm btn-primary" (click)="applyCustomRange()" [disabled]="!customFrom || !customTo">
                  <i class="material-icons" style="font-size:16px;">search</i>
                </button>
              </div>

              <label class="pending-toggle">
                <input type="checkbox" [(ngModel)]="includePending" (change)="loadData()"> Kutilayotgan
              </label>

              <button class="btn btn-sm btn-outline-info refresh-btn" (click)="loadData()" [disabled]="loading">
                <i class="material-icons" style="font-size:16px;">refresh</i>
              </button>
            </div>

            <div class="period-label" *ngIf="periodLabel">
              <i class="material-icons">info_outline</i> {{ periodLabel }}
            </div>

            <!-- Loading -->
            <div *ngIf="loading" class="text-center" style="padding: 40px;">
              <div class="spinner-border text-primary" role="status"></div>
            </div>

            <!-- Table -->
            <div *ngIf="!loading && collections.length > 0" class="table-responsive">
              <table class="table table-hover table-striped table-sm">
                <thead>
                  <tr>
                    <th>Hisob</th>
                    <th>Valyuta</th>
                    <th class="text-right">Jami (Asl)</th>
                    <th class="text-right">Jami (USD)</th>
                    <th class="text-center">Soni</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let c of collections">
                    <td><strong>{{ c.account_name }}</strong></td>
                    <td>{{ c.currency }}</td>
                    <td class="text-right"><strong>{{ fmt(c.total_original) }} {{ c.currency }}</strong></td>
                    <td class="text-right"><small>{{ fmt(c.total_usd) }} $</small></td>
                    <td class="text-center"><small>{{ c.payment_count }}</small></td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Empty state -->
            <div *ngIf="!loading && collections.length === 0" class="text-center" style="padding: 50px;">
              <i class="material-icons" style="font-size: 60px; color: #ccc;">bar_chart</i>
              <p class="text-muted mt-2">Ma'lumot topilmadi</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
